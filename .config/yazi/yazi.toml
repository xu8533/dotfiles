# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
#
#"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio = [1, 4, 3]
sort_by = "mtime"
sort_sensitive = true
sort_reverse = true
sort_dir_first = true
linemode = "size_and_mtime"
show_hidden = false
show_symlink = true
scrolloff = 8
title_format = "{cwd} - Yazi"

[preview]
tab_size = 4
# max_width = 600
# max_height = 900
max_width = 1000
max_height = 1000
image_delay = 100
# image_filter = "triangle"
image_filter = "catmull-rom"
image_quality = 75
wrap = "yes"

[opener]
download = [
	{ run = "ya emit download --open %S", desc = "下载并打开" },
	{ run = "ya emit download %S",        desc = "下载" },
]
edit = [
    { run = "${EDITOR:-vi} %s", block = true, for = "unix" },
    { run = "%EDITOR% %s", orphan = true, for = "windows" },
]
extract = [
    { run = 'ya pub extract --list %s', desc = "解压到这...", for = "unix" },
    { run = 'ya pub extract --list %*', desc = "解压到这...", for = "windows" },
]
image = [
    { run = 'swayimg --class=yazi-img-preview %s', desc = "打开图片", for = "linux" },
]
open = [
    { run = "$EDITOR %s1", desc = "打开", for = "linux" },
    { run = 'start "" %s1', orphan = true, desc = "打开", for = "windows" },
]
play = [
    { run = 'mpv --force-window %s', orphan = true, for = "unix" },
    { run = 'mpv --force-window %s', orphan = true, for = "windows" },
    { run = "mediainfo %s1; echo '请按enter键退出'; read_", block = true, desc = "显示多媒体信息", for = "unix" },
    { run = "mediainfo %s1 & pause", block = true, desc = "显示多媒体信息", for = "windows" },
]
pdf = [
    # { run = 'evince %s', desc = "打开pdf", for = "linux" }
    { run = 'qpdfview %s', desc = "打开pdf", for = "linux" }
]
reveal = [
    { run = "explorer /select,%s1", orphan = true, desc = "展示", for = "windows" },
    # { run = 'yazi "$(dirname "$1")"', desc = "显示目录", for = "linux" },
    { run = 'lf %d1', desc = "显示目录", for = "linux" },
    # { run = 'yazi %d1', desc = "显示目录", for = "linux" },
    { run = "clear; exiftool %s1; echo '请按enter键退出'; read _", block = true, desc = "显示EXIF", for = "unix" },
]

[open]
rules = [
    { url = "*/", use = [
        "open",
        "edit",
        "reveal",
    ] },
    { mime = "text/*", use = [
        "edit",
        "reveal",
    ] },
    { mime = "image/*", use = [
        "image",
        "reveal",
    ] },
    { mime = "{audio,video}/*", use = [
        "play",
        "reveal",
    ] },
    { mime = "inode/x-empty", use = [
        "edit",
        "reveal",
    ] },

    { mime = "application/{json,ndjson}", use = [
        "edit",
        "reveal",
    ] },
    { mime = "*/javascript", use = [
        "edit",
        "reveal",
    ] },

    { mime = "application/pdf", use = [
        "pdf",
        "open",
    ] },

    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ 
        "extract", 
        "reveal", 
    ] },

    { mime = "inode/empty", use = [ 
        "edit", 
        "reveal",
    ] },

	# Virtual file system
	{ mime = "vfs/{absent,stale}", use = "download" },

    { mime = "*", use = [
        "open",
        "reveal",
    ] },
]

[tasks]
micro_workers = 10
macro_workers = 25
bizarre_retry = 5
image_alloc = 1073741824 # 1024MB
image_bound = [0, 0]
suppress_preload = false

[plugin]

fetchers = [
    # Mimetype
	{ url = "*/",         run = "mime.dir", prio = "high", group = "mimpe" },
	{ url = "local://*",  run = "mime.local", prio = "high", group = "mimpe" },
	{ url = "remote://*", run = "mime.remote", prio = "high", group = "mimpe" },
]

spotters = [
	# Multi-file
	{ mime = "multi/*", run = "multi" },
    # Folder
    { url = "*/", run = "folder" },
    # Code
    { mime = "text/*", run = "code" },
    { mime = "application/{mbox,xml,javascript,wine-extension-ini}", run = "code" },
    # Image
    { mime = "image/{avif,hei?,jxl}", run = "magick" },
    { mime = "image/svg+xml", run = "svg" },
    { mime = "image/*", run = "image" },
    # Video
    { mime = "video/*", run = "video" },
	# Virtual file system
	{ mime = "vfs/*", run = "vfs" },
	# Error
	{ mime = "null/*", run = "null" },
    # Fallback
    { url = "*", run = "file" },
]

 prepend_preloaders = [
    # Replace magick, image, video with mediainfo
    { mime = "audio/*", run = "mediainfo" },
    # { mime = "{audio,video,image}/*", run = "mediainfo" },
    { mime = "application/subrip", run = "mediainfo" },
    # Adobe Illustrator, Adobe Photoshop is image/adobe.photoshop, already handled above
    { mime = "application/postscript", run = "mediainfo" },
    # gvfs.yazi
    { url = "/run/user/1000/gvfs/**/*", run = "noop" },
    { url = "/run/media/xujian/**/*", run = "noop" },
  ]

preloaders = [
    # Image
    { mime = "image/{avif,hei?,jxl}", run = "magick" },
    { mime = "image/svg+xml", run = "svg" },
    { mime = "image/*", run = "image" },
    # Video
    { mime = "video/*", run = "video" },
    # PDF
    { mime = "application/pdf", run = "pdf" },
    # Font
    { mime = "font/*", run = "font" },
    { mime = "application/ms-opentype", run = "font" },
]

prepend_previewers = [
    { url = "*.tar*", run  = 'piper --format=url -- tar tf "$1"' },
    { url = "*.csv", run  = 'piper -- bat -p --color=always "$1"' },
    { url = "*.md", run  = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"' },
    # { url = "*/", run  = 'piper -- eza -TL=3 --color=always --icons=always --group-directories-first --no-quotes "$1"' },
    # from mux.yazi
    { url = "*/", run = "mux eza_tree_1 eza_tree_2 eza_tree_3 eza_tree_4" },
    # 用mediainfo替换默认的magick, image, video
    { mime = "{audio,video,image}/*", run = "mediainfo"},
    { mime = "application/subrip", run = "mediainfo" },
    # Adobe Illustrator, Adobe Photoshop is image/adobe.photoshop, already handled above
    { mime = "application/postscript", run = "mediainfo" },
    # { mime = "audio/*", run = "exifaudio" },
    # { name = "*.md", run = "glow" },
    # Archive previewer
    {mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}", run  = "ouch"},
    # gvfs.yazi
    { url = "/run/user/1000/gvfs/**/*", run = "noop" },
    { url = "/run/media/xujian/**/*", run = "noop" },
]
previewers = [
    { url = "*/", run = "folder"},
    # Code
    { mime = "text/*", run = "code" },
    { mime = "*/{mbox,xml,javascript,wine-extension-ini}", run = "code" },
    # JSON
    { mime = "application/{json,ndjson}", run = "json" },
    # Image
    { mime = "image/{avif,hei?,jxl}", run = "magick" },
    { mime = "image/svg+xml", run = "svg" },
    { mime = "image/*", run = "image" },
    # Video
    { mime = "video/*", run = "video" },
    # PDF
    { mime = "application/pdf", run = "pdf" },
    # Archive
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
    { mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
    { url = "*.{AppImage,appimage}", run = "archive" },
    # Virtual Disk / Disk Image
    { mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
    { mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
    { url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
    # Font
    { mime = "font/*", run = "font" },
    { mime = "application/ms-opentype", run = "font" },
    # Empty file
    { mime = "inode/empty", run = "empty" },
	# Virtual file system
	{ mime = "vfs/*", run = "vfs" },
	# Error
	{ mime = "null/*", run = "null" },
    # Fallback
    { url = "*", run = "file" },
]
append_previewers = [
    # 在未匹配到任何previewer的情况下，使用hexyl替换默认的file,显示文件内容
    { url = "*", run  = 'piper -- hexyl --border=none --terminal-width=$w "$1"' },
]

[input]
cursor_blink = true
# cd
cd_title = "切换目录:"
cd_origin = "top-center"
cd_offset = [0, 2, 50, 3]

# create
create_title = ["新建:", "新建文件夹:"]
create_origin = "top-center"
create_offset = [0, 2, 50, 3]

# rename
rename_title = "重命名:"
rename_origin = "hovered"
rename_offset = [0, 1, 50, 3]

# filter
filter_title = "过滤:"
filter_origin = "top-center"
filter_offset = [0, 2, 50, 3]

# find
find_title = ["查找下一个:", "查找上一个:"]
find_origin = "top-center"
find_offset = [0, 2, 50, 3]

# search
search_title = "搜索:"
search_origin = "top-center"
search_offset = [0, 2, 50, 3]

# shell
shell_title = ["Shell:", "Shell (block):"]
shell_origin = "top-center"
shell_offset = [0, 2, 50, 3]

[confirm]
# trash
trash_title = "将选择的文件移动到回收站? (y/N)"
trash_origin = "top-center"
trash_offset = [0, 2, 50, 3]

# delete
delete_title = "永久删除选择的文件? (y/N)"
delete_origin = "top-center"
delete_offset = [0, 2, 50, 3]

# overwrite
overwrite_title = "覆盖文件? (y/N)"
overwrite_origin = "top-center"
overwrite_offset = [0, 2, 50, 3]

# quit
quit_title = "有正在运行的任务, 确定退出? (y/N)"
quit_origin = "top-center"
quit_offset = [0, 2, 50, 3]

[pick]
open_title = "使用下列方式打开:"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]

[which]
sort_by = "key"
sort_sensitive = true
sort_translit = true
