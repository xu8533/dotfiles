# font_family               family="MesloLGSDZ Nerd Font"
# font_family               family="MesloLGSDZ Nerd Font Mono"
# font_family               family="mononoki Nerd Font Mono"
# font_family               family="Sarasa Term SC"
# font_family               family="SauceCodePro Nerd Font"
# font_family               family="SauceCodePro Nerd Font Mono"
# font_family               family="BlexMono Nerd Font Mono"
# font_family               family="FiraCode Nerd Font Mono" features="+cv02 +cv05 +cv09 +cv14 +ss04 +cv16 +cv31 +cv25 +cv26 +cv32 +cv28 +ss10 +zero +onum"
# font_family               family="Nimbus Mono PS"
# font_family               family="VictorMono Nerd Font Mono"
# font_family               postscript_name="LXGWWenKaiMono-Regular"

bold_font        auto
italic_font      auto
bold_italic_font auto

# font_size 9
# font_size 14.0
# font_size 15.0
# font_size 16.0
font_size 18.0

# 下划线和删除线的位置或粗细
modify_font underline_position -2
modify_font underline_thickness 150%
modify_font strikethrough_thickness 200%
modify_font strikethrough_position 2px

# 修改每个字体字形的单元格的大小以及字形在单元格中的基线
# modify_font cell_width 80%
# modify_font cell_height -2px
# modify_font baseline 3

# 行高调整为100%（标准高度，不拉伸）
adjust_line_height 100%

# 连字功能设置 - 始终禁用连字（在编程时字符分离更清晰）
disable_ligatures always

# 中文改用 霞鹜文楷；这里不能写引号，kitty 会把引号也当成字体名的一部分
symbol_map U+3000-U+303F,U+3400-U+4DBF,U+4E00-U+9FFF,U+F900-U+FAFF,U+FF00-U+FFEF LXGW WenKai

# symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E00A,U+E0A0-U+E0A3,U+E0B0-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6AA,U+E700-U+E7C5,U+EA60-U+EBEB,U+F000-U+F2E0,U+F300-U+F32F,U+F400-U+F4A9,U+F500-U+F8FF,U+F0001-U+F1AF0 Symbols Nerd Font Mono
