# vim:ft=kitty

lines 36
columns 80
edge top
background_opacity 0.95
app_id kitty-quick-access
hide_on_focus_loss no
# grab_keyboard yes

kitty_override font_family family="Sarasa Term SC"
kitty_override font_size 18.0
kitty_override background_image $HOME/图片/Wallpapers/美杜莎133.jpg
kitty_override background_image_layout centered
kitty_override tab_bar_style hidden
kitty_override window_logo_path none
