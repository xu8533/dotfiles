windowrule {
    name = glava
    match:title = ^(glava)$
    border_size = 0
    no_focus = on
    no_shadow = on
    float = on
    pin = on
    no_blur = on
    fullscreen_state = 0
    opacity = 0.45
    move = -40% 30%
}

windowrule {
    name = music-cava
    match:title = ^(cava)$|^(Music)$
    border_size = 0
    float = on
    opacity = 0.8
    size = 600 300
}

windowrule {
    name = screen-locker
    match:title = ^(ťĒĀŚĪŹ)$
    float = on
    border_size = 0
    opacity = 0.8 0.6
    # tile = on
}

windowrule {
    name = social_media
    match:class = ^(?:.*-wechat)$|^(?:wechat)$
    float = on
    center = on
    border_size = 0
    size = 1370 1070
    workspace = name:office
}


