# layerrule = match:namespace .*, xray on
# layerrule = blur on, match:namespace start-menu
# layerrule = animation fade, match:namespace start-menu
# layerrule = ignore_alpha 0, match:namespace start-menu
# layerrule = dim_around on, match:namespace start-menu
layerrule = blur on, match:namespace rofi
layerrule = animation slide, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = dim_around on, match:namespace rofi
# layerrule = no_anim true, match:namespace rofi
# layerrule = blur true,match:namespace logout_dialog
layerrule = animation off, match:namespace hyprpicker  # Colour picker out animation
layerrule = animation fade, match:namespace selection  # slurp

# Fuzzel
layerrule = animation popin 80%, match:namespace launcher
layerrule = blur true, match:namespace launcher

# smart gaps and no gaps when only
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

# workspace = 3, layoutopt:direction:left
workspace = special:special, gapsout:30
workspace = name:note, border:false, shadow:false, rounding:false, decorate:false, gapsin:0, gapsout:0
