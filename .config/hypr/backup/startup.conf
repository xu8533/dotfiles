# exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = systemctl --user start hyprpolkitagent # hyprland官方认证程序
exec-once = hypridle # 空闲5分钟后休眠
exec-once = dbus-update-activation-environment --all
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # obs等录屏应用需要
# exec-once = hyprpm reload
# exec-once = ~/.config/hypr/scripts/resetxdgportal.sh # reset XDPH for screenshare
exec-once = wl-paste --type text --watch cliphist store # 保留文本到剪贴板
exec-once = wl-paste --type image --watch cliphist store # 保留图片到剪贴板
# exec-once = LANG=zh_CN.UTF-8 ags run > /tmp/agslogs.log 2>&1 &# 桌面面板
# 动态修改壁纸
# exec-once = qs -c end4/ii
exec-once = qs -c caelestia

exec-once = udiskie --automount --notify --tray & #自动挂载移动硬盘和U盘
exec-once = sleep 3 && udisksctl mount -b /dev/nvme0n1p6 #自动挂载本地硬盘分区
exec-once = fcitx5 --replace -d # 输入法
# exec-once = waybar --config $HOME/.config/waybar/config.jsonc --style $HOME/.config/waybar/style.css # 启动waybar
# exec-once = dunst # 通知程序
exec-once = sleep 3 && kitty
# exec-once = swayosd-server # daxiaoxie xianshi
# exec-once = hyprctl setcursor material-light-cursors 36
exec-once = hyprctl setcursor Bibata-Modern-Turquoise 22
# exec-once = mpd &
exec-once = hyprsunset
execr = $HOME/.local/bin/monitor-auto.sh
